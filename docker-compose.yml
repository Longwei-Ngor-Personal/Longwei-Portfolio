version: "3.9"

services:
  caddy:
    image: caddy:2
    container_name: portfolio_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./portfolio:/srv
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: always

volumes:
  caddy_data:
  caddy_config: